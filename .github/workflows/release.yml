name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Install Level Zero development files
        run: |
          sudo apt-get update
          sudo apt-get install --yes libze-dev libclang-dev
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo build --locked --release
      - name: Verify runtime dependencies
        run: |
          readelf -d target/release/xfer | grep NEEDED
          test "$(readelf -d target/release/xfer | grep NEEDED | grep -Ev 'libze_loader\\.so\\.1|libgcc_s\\.so\\.1|libc\\.so\\.6|ld-linux' | wc -l)" -eq 0
      - name: Package portable binary
        run: |
          install -Dm755 target/release/xfer dist/xfer
          tar -C dist -czf xfer-x86_64-linux-gnu.tar.gz xfer
          sha256sum xfer-x86_64-linux-gnu.tar.gz > xfer-x86_64-linux-gnu.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: xfer-x86_64-linux-gnu
          path: |
            xfer-x86_64-linux-gnu.tar.gz
            xfer-x86_64-linux-gnu.tar.gz.sha256
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            xfer-x86_64-linux-gnu.tar.gz
            xfer-x86_64-linux-gnu.tar.gz.sha256
