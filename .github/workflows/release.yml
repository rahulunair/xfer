name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Install Level Zero development files
        run: |
          sudo apt-get update
          sudo apt-get install --yes libze-dev libclang-dev pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo test --locked --all-targets
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo build --locked --release
      - run: sh -n install.sh
      - name: Verify runtime dependencies
        run: |
          needed="$(readelf -d target/release/xfer | sed -n 's/.*Shared library: \[\(.*\)\]/\1/p')"
          printf '%s\n' "$needed"
          unexpected="$(printf '%s\n' "$needed" | grep -Ev '^(libze_loader\.so\.1|libgcc_s\.so\.1|libm\.so\.6|libc\.so\.6|libdl\.so\.2|libpthread\.so\.0|librt\.so\.1)$' || true)"
          test -z "$unexpected"
      - name: Package portable binary
        run: |
          install -Dm755 target/release/xfer dist/xfer
          tar -C dist -czf xfer-x86_64-linux-gnu.tar.gz xfer
          sha256sum xfer-x86_64-linux-gnu.tar.gz > xfer-x86_64-linux-gnu.tar.gz.sha256
          tar -tzf xfer-x86_64-linux-gnu.tar.gz | grep -Fx xfer
      - uses: actions/upload-artifact@v4
        with:
          name: xfer-x86_64-linux-gnu
          overwrite: true
          path: |
            xfer-x86_64-linux-gnu.tar.gz
            xfer-x86_64-linux-gnu.tar.gz.sha256
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            xfer-x86_64-linux-gnu.tar.gz
            xfer-x86_64-linux-gnu.tar.gz.sha256
